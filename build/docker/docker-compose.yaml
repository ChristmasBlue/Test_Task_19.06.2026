version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: taskmanager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskmanager
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  migrate:
    image: golang:1.26-alpine
    container_name: taskmanager-migrate
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations
    command: >
      sh -c "
        go install github.com/pressly/goose/v3/cmd/goose@latest &&
        goose -dir /migrations mysql 'root:root@tcp(mysql:3306)/taskmanager?parseTime=true' up
      "
    restart: "no"

  app:
    build:
      context: ../../
      dockerfile: build/docker/taskmanager/Dockerfile
    container_name: taskmanager-app
    depends_on:
      migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/configs/config.docker.yaml
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ../../configs:/app/configs
    restart: unless-stopped

volumes:
  mysql_data: